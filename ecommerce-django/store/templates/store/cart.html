{% extends "store/base.html" %}
{% block content %}
<h1>Your cart</h1>
{% if items %}
  <ul>
  {% for it in items %}
    <li>{{ it.quantity }} × {{ it.product.title }} — ₹{{ it.subtotal }}</li>
  {% endfor %}
  </ul>
  <p>Total: ₹{{ total }}</p>
  <a href="{% url 'store:checkout' %}">Checkout</a>
{% else %}
  <p>Cart is empty</p>
{% endif %}
{% endblock %}
